version: "2"
linters:
  default: none
  enable:
  - asciicheck
  - bodyclose
  - depguard
  - dupl
  - errcheck
  - gocritic
  - goprintffuncname
  - gosec
  - govet
  - ineffassign
  - misspell
  - nakedret
  - revive
  - rowserrcheck
  - staticcheck
  - unconvert
  - unparam
  - unused
  settings:
    depguard:
      rules:
        main:
          deny:
          - pkg: sync/atomic
            desc: use type-safe atomics from go.uber.org/atomic
    dupl:
      threshold: 100
    exhaustive:
      default-signifies-exhaustive: false
    funlen:
      lines: 200
      statements: 150
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
      - importShadow
      - unnamedResult
      enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    gocyclo:
      min-complexity: 15
    govet:
      settings:
        printf:
          funcs:
          - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Debugf
          - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Infof
          - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Warnf
          - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Errorf
          - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Fatalf
    lll:
      line-length: 140
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
  exclusions:
    generated: lax
    presets:
    - comments
    - common-false-positives
    - legacy
    - std-error-handling
    rules:
    - linters:
      - gocritic
      text: 'unnecessaryDefer:'
    - path: (.+)\.go$
      text: 'shadow: declaration of "err" shadows declaration at'
    paths:
    - cmd/docs
    - third_party$
    - builtin$
    - examples$
issues:
  max-same-issues: 0
formatters:
  enable:
  - gofmt
  - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
    - cmd/docs
    - third_party$
    - builtin$
    - examples$